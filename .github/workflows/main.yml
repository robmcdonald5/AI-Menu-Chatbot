name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    # Set up Node.js environment for JavaScript/React
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'  # Specify your Node.js version

    - name: Install Node.js dependencies
      run: npm install
      # Remove or correct the working-directory
      # working-directory: ./AI-Menu-Chatbot

    # Set up Python environment for backend
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.12'  # Specify your Python version

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run tests
      run: npm test && pytest  # Adjust test commands as needed for both environments
